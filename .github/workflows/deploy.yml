name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'infrastructure/**'
      - 'modules/**'
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'infrastructure/**'
      - 'modules/**'
  workflow_dispatch:

concurrency:
  group: vpn-terraform-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        env:
          TF_CLI_ARGS: -no-color
        run: |
          # Configure backend with values from config secret
          terraform init \
            -backend-config bucket=${{ secrets.STATE_BUCKET }} \
            -backend-config region=${{ env.AWS_REGION }}

      - name: Terraform Plan
        env:
          TF_VAR_home_peer_public_key: ${{ secrets.TRUENAS_PUB_KEY }}
          TF_VAR_home_lan_cidr: ${{ secrets.HOME_LAN_CIDR }}
          TF_VAR_root_domain_name: ${{ secrets.DOMAIN }}
          TF_VAR_prefix: ${{ secrets.PREFIX }}
          TF_CLI_ARGS: -no-color
        run: |
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        # if: github.ref == 'refs/heads/main'
        env:
          TF_CLI_ARGS: -no-color
        run: |
          terraform apply -input=false -auto-approve tfplan